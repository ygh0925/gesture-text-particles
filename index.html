<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>手势粒子 · 生日惊喜</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #07071c;
    touch-action: manipulation;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  #scene { position: fixed; inset: 0; display: block; }

  /* 摄像头小窗(右下角) */
  #camWrap {
    position: fixed; right: 12px; bottom: 12px;
    width: 150px; height: 112px;
    border-radius: 14px; overflow: hidden;
    border: 1.5px solid rgba(255,255,255,.35);
    background: rgba(0,0,0,.4);
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    opacity: 0; transition: opacity .6s;
    z-index: 5;
  }
  #camWrap.show { opacity: 1; }
  #video {
    width: 100%; height: 100%; object-fit: cover;
    transform: scaleX(-1); /* 镜像 */
  }

  /* 开始界面 */
  #startOverlay {
    position: fixed; inset: 0; z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 40%, #1a1a4a 0%, #0a0a24 60%, #050514 100%);
    transition: opacity .8s;
  }
  #startOverlay.hide { opacity: 0; pointer-events: none; }
  #startOverlay h1 {
    color: #ffd9ec; font-size: clamp(22px, 5vw, 36px);
    font-weight: 700; letter-spacing: 4px; margin-bottom: 10px;
    text-shadow: 0 0 24px rgba(255,150,210,.6);
  }
  #startOverlay p { color: rgba(255,255,255,.55); font-size: 14px; margin-bottom: 40px; letter-spacing: 2px; }
  #startBtn {
    padding: 16px 52px; font-size: 20px; letter-spacing: 6px;
    color: #fff; background: linear-gradient(135deg, #ff7eb3, #a78bfa);
    border: none; border-radius: 999px; cursor: pointer;
    box-shadow: 0 6px 30px rgba(255,126,179,.45);
    transition: transform .15s;
  }
  #startBtn:active { transform: scale(.95); }

  /* 加载提示 */
  #loading {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%);
    z-index: 15; color: #ffd9ec; font-size: 16px; letter-spacing: 3px;
    background: rgba(10,10,40,.7); padding: 14px 30px; border-radius: 12px;
    display: none;
  }
  #loading.show { display: block; }

  /* 操作提示 */
  #hint {
    position: fixed; left: 12px; bottom: 12px; z-index: 5;
    color: rgba(255,255,255,.55); font-size: 12px; line-height: 1.7;
    background: rgba(10,10,40,.45); padding: 8px 14px; border-radius: 10px;
    letter-spacing: 1px; opacity: 0; transition: opacity .6s;
    max-width: min(60vw, 320px);
  }
  #hint.show { opacity: 1; }

  #errMsg {
    position: fixed; left: 50%; top: 20%; transform: translateX(-50%);
    z-index: 30; color: #ffb3b3; font-size: 14px; text-align: center;
    background: rgba(60,10,20,.85); padding: 14px 22px; border-radius: 12px;
    display: none; max-width: 80vw; line-height: 1.6;
  }
</style>
</head>
<body>
<canvas id="scene"></canvas>

<div id="camWrap"><video id="video" playsinline muted autoplay></video></div>

<div id="startOverlay">
  <h1>✨ 手势粒子星空 ✨</h1>
  <p>需要使用前置摄像头识别手势</p>
  <button id="startBtn">开 始</button>
</div>

<div id="loading">模型加载中…</div>
<div id="hint">伸出 1~4 根手指试试<br>双手合拢再张开有惊喜 ✨</div>
<div id="errMsg"></div>

<!-- 第三方库(已本地化,不依赖外部 CDN,国内网络可用) -->
<script src="./vendor/three.min.js"></script>
<script src="./vendor/camera_utils.js"></script>
<script src="./vendor/hands/hands.js"></script>

<script>
"use strict";

/* ============================================================
 * 基础配置
 * ============================================================ */
const IS_MOBILE = /iPhone|iPad|Android/i.test(navigator.userAgent)
  || (navigator.maxTouchPoints > 1 && /Mac/.test(navigator.userAgent)); // iPadOS 伪装 Mac
const PARTICLE_COUNT = IS_MOBILE ? 12000 : 22000;
const STABLE_FRAMES = 15;         // 手势稳定帧数(约0.5s)
const ORB_DIST      = 0.22;       // 双手对握距离阈值(归一化;太小时两手重叠会丢检测)
const COMPRESS_MAX_DIST = 0.55;   // 开始压缩的最大距离
const EXPLODE_SPEED = 0.028;      // 触发爆炸的双手分离速度(每帧)

/* ============================================================
 * Three.js 场景
 * ============================================================ */
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x07071c, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07071c, 0.004);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 500);
camera.position.z = 60;

// 深蓝紫夜空渐变背景(大球体内壁)
(function makeSky() {
  const c = document.createElement('canvas');
  c.width = 2; c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createLinearGradient(0, 0, 0, 256);
  grad.addColorStop(0, '#1b1140');
  grad.addColorStop(0.5, '#0d0a2e');
  grad.addColorStop(1, '#05051a');
  g.fillStyle = grad; g.fillRect(0, 0, 2, 256);
  const tex = new THREE.CanvasTexture(c);
  const sky = new THREE.Mesh(
    new THREE.SphereGeometry(300, 16, 16),
    new THREE.MeshBasicMaterial({ map: tex, side: THREE.BackSide, fog: false })
  );
  scene.add(sky);
})();

// 发光圆点贴图
function makeSprite() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.3, 'rgba(255,235,245,.85)');
  grad.addColorStop(0.7, 'rgba(255,200,230,.25)');
  grad.addColorStop(1, 'rgba(255,200,230,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}

/* ---------- 粒子系统 ---------- */
const positions  = new Float32Array(PARTICLE_COUNT * 3); // 当前位置
const targets    = new Float32Array(PARTICLE_COUNT * 3); // 目标位置
const velocities = new Float32Array(PARTICLE_COUNT * 3); // 爆炸速度
const colors     = new Float32Array(PARTICLE_COUNT * 3);
const homePos    = new Float32Array(PARTICLE_COUNT * 3); // 自由漂浮基准位置
const phase      = new Float32Array(PARTICLE_COUNT);     // 漂浮相位

// 樱花系配色
const PALETTE = [
  [1.00, 0.72, 0.84], // 粉
  [1.00, 0.88, 0.93], // 浅粉白
  [0.95, 0.95, 1.00], // 白
  [0.80, 0.72, 1.00], // 淡紫
  [1.00, 0.85, 0.60], // 暖金
];

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const r = 30 + Math.random() * 90;
  const th = Math.random() * Math.PI * 2;
  const ph = Math.acos(2 * Math.random() - 1);
  const x = r * Math.sin(ph) * Math.cos(th);
  const y = r * Math.sin(ph) * Math.sin(th) * 0.6;
  const z = r * Math.cos(ph) * 0.5 - 10;
  homePos[i*3] = x; homePos[i*3+1] = y; homePos[i*3+2] = z;
  positions[i*3] = x; positions[i*3+1] = y; positions[i*3+2] = z;
  targets[i*3] = x; targets[i*3+1] = y; targets[i*3+2] = z;
  phase[i] = Math.random() * Math.PI * 2;
  const col = PALETTE[(Math.random() * PALETTE.length) | 0];
  colors[i*3] = col[0]; colors[i*3+1] = col[1]; colors[i*3+2] = col[2];
}

const baseColors = new Float32Array(colors); // 樱花配色备份(照片模式会改写 colors)

const geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

// 照片模式用实心圆点(发光渐变贴图太虚,拼不出实色画面)
function makePhotoSprite() {
  const c = document.createElement('canvas');
  c.width = c.height = 64;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.78, 'rgba(255,255,255,1)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  g.fillStyle = grad; g.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(c);
}
const glowSpriteTex = makeSprite();
const photoSpriteTex = makePhotoSprite();

const material = new THREE.PointsMaterial({
  size: 0.9,
  map: glowSpriteTex,
  vertexColors: true,
  transparent: true,
  opacity: 0.9,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
  sizeAttenuation: true,
});
scene.add(new THREE.Points(geometry, material));

/* ============================================================
 * 气球系统:祝福文字出现时,气球从底部源源不断升起
 * ============================================================ */
function makeBalloonTexture() {
  const c = document.createElement('canvas');
  c.width = 128; c.height = 208;
  const g = c.getContext('2d');
  // 气球本体(近白色,靠 SpriteMaterial.color 染色)
  const grad = g.createRadialGradient(48, 44, 6, 64, 62, 62);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.5, 'rgba(235,235,235,.96)');
  grad.addColorStop(1, 'rgba(190,190,190,.92)');
  g.fillStyle = grad;
  g.beginPath();
  g.ellipse(64, 62, 46, 57, 0, 0, Math.PI * 2);
  g.fill();
  // 底部小结
  g.beginPath();
  g.moveTo(58, 116); g.lineTo(70, 116); g.lineTo(64, 126);
  g.closePath();
  g.fillStyle = 'rgba(200,200,200,.95)';
  g.fill();
  // 飘带绳子
  g.strokeStyle = 'rgba(255,255,255,.65)';
  g.lineWidth = 2.5;
  g.beginPath();
  g.moveTo(64, 126);
  g.bezierCurveTo(52, 150, 78, 168, 62, 200);
  g.stroke();
  return new THREE.CanvasTexture(c);
}

const BALLOON_COUNT = IS_MOBILE ? 16 : 26;
const BALLOON_COLORS = [0xff6b9d, 0xffd166, 0x9b5de5, 0x4cc9f0, 0xff8fab, 0xf3722c, 0x90be6d];
const balloonTex = makeBalloonTexture();
const balloons = [];
for (let i = 0; i < BALLOON_COUNT; i++) {
  const sp = new THREE.Sprite(new THREE.SpriteMaterial({
    map: balloonTex, transparent: true, opacity: 0, depthWrite: false,
  }));
  sp.visible = false;
  sp.userData = { active: false, vy: 0, sway: 0, phase: 0, halfH: 40 };
  scene.add(sp);
  balloons.push(sp);
}
let lastBalloonSpawn = 0;

function spawnBalloon() {
  const b = balloons.find(x => !x.userData.active);
  if (!b) return;
  const u = b.userData;
  // 文字模式:气球在文字后方升起,不遮字;照片铺满全屏时:气球飘在照片前面
  const z = display === 'photo' ? 4 + Math.random() * 12 : -26 + Math.random() * 20;
  const dist = camera.position.z - z;
  const halfH = dist * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
  const halfW = halfH * camera.aspect;
  const size = 4.5 + Math.random() * 3.5;
  u.active = true;
  u.vy = 9 + Math.random() * 7;
  u.sway = 2 + Math.random() * 3;
  u.phase = Math.random() * Math.PI * 2;
  u.halfH = halfH;
  b.scale.set(size * 0.62, size, 1);
  b.position.set((Math.random() * 2 - 1) * halfW * 0.92, -halfH - size, z);
  b.material.color.setHex(BALLOON_COLORS[(Math.random() * BALLOON_COLORS.length) | 0]);
  b.material.opacity = 0;
  b.visible = true;
}

function updateBalloons(t, dt) {
  const on = (display === 'name' || display === 'msg' || display === 'photo') && mode !== 'explode';
  if (on && t - lastBalloonSpawn > 0.3) {
    lastBalloonSpawn = t;
    spawnBalloon();
    if (Math.random() < 0.35) spawnBalloon(); // 偶尔一次升两个,更热闹
  }
  for (const b of balloons) {
    const u = b.userData;
    if (!u.active) continue;
    b.position.y += u.vy * dt;
    b.position.x += Math.sin(t * 1.1 + u.phase) * u.sway * dt;
    b.material.rotation = Math.sin(t * 1.4 + u.phase) * 0.09;
    const topY = u.halfH + b.scale.y * 1.6;
    const fadeIn  = (b.position.y + u.halfH + b.scale.y) / 6;
    const fadeOut = (topY - b.position.y) / 8;
    b.material.opacity = 0.92 * Math.max(0, Math.min(1, fadeIn, fadeOut));
    if (b.position.y > topY) { u.active = false; b.visible = false; }
  }
}

/* ============================================================
 * 人物照片 → 粒子画像(爆炸后展示)
 * ============================================================ */
const photoImg = new Image();
let photoReady = false;
photoImg.onload = () => { photoReady = true; };
photoImg.onerror = () => { photoReady = false; };
photoImg.src = './photo.jpg';
let photoDotSize = 0.6; // 照片模式的粒子尺寸(按网格间距算出)

function setPhotoTargets() {
  if (!photoReady) return false;
  const visH = 2 * camera.position.z * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
  const visW = visH * camera.aspect;
  // 粒子网格按屏幕比例分布,铺满全屏
  let rows = Math.floor(Math.sqrt(PARTICLE_COUNT * visH / visW));
  let cols = Math.floor(rows * visW / visH);
  while (rows * cols > PARTICLE_COUNT) rows--;
  // 照片按 cover 方式裁剪:短边撑满,超出部分裁掉(横竖屏都全屏)
  const pw = photoImg.naturalWidth, ph = photoImg.naturalHeight;
  const screenAspect = visW / visH;
  let sx, sy, srcW, srcH;
  if (pw / ph > screenAspect) {
    srcH = ph; srcW = ph * screenAspect; sx = (pw - srcW) / 2; sy = 0;
  } else {
    srcW = pw; srcH = pw / screenAspect; sx = 0;
    sy = (ph - srcH) * 0.32; // 竖图裁上下时偏向上方,保住脸部
  }
  const c = document.createElement('canvas');
  c.width = cols; c.height = rows;
  const g = c.getContext('2d');
  g.drawImage(photoImg, sx, sy, srcW, srcH, 0, 0, cols, rows);
  const px = g.getImageData(0, 0, cols, rows).data;

  const spacing = visH / rows; // rows×spacing = 可视高度,正好铺满
  photoDotSize = spacing * 2.0; // 点径大于间距,相互衔接铺满画面

  let idx = 0;
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const di = (y * cols + x) * 4;
      targets[idx*3]   = (x - cols / 2) * spacing;
      targets[idx*3+1] = -(y - rows / 2) * spacing;
      targets[idx*3+2] = (Math.random() - 0.5) * 1.2;
      // 提亮补偿贴图边缘透明衰减
      colors[idx*3]   = Math.min(1, px[di]     / 255 * 1.28);
      colors[idx*3+1] = Math.min(1, px[di + 1] / 255 * 1.28);
      colors[idx*3+2] = Math.min(1, px[di + 2] / 255 * 1.28);
      idx++;
    }
  }
  // 余下的粒子随机叠在已有像素上,增加厚度
  const used = idx;
  for (; idx < PARTICLE_COUNT; idx++) {
    const j = (Math.random() * used) | 0;
    targets[idx*3]   = targets[j*3];
    targets[idx*3+1] = targets[j*3+1];
    targets[idx*3+2] = (Math.random() - 0.5) * 1.2;
    colors[idx*3] = colors[j*3]; colors[idx*3+1] = colors[j*3+1]; colors[idx*3+2] = colors[j*3+2];
  }
  geometry.attributes.color.needsUpdate = true;
  return true;
}

function restoreBaseColors() {
  colors.set(baseColors);
  geometry.attributes.color.needsUpdate = true;
}

/* ============================================================
 * 文字 → 粒子目标点采样
 * ============================================================ */
function sampleTextPoints(lines, big) {
  const fontSize = 220;
  const lineGap = fontSize * 1.18;
  const c = document.createElement('canvas');
  const g = c.getContext('2d');
  const font = `900 ${fontSize}px "PingFang SC","Heiti SC","Microsoft YaHei",sans-serif`;
  g.font = font;
  let maxW = 0;
  for (const ln of lines) maxW = Math.max(maxW, g.measureText(ln).width);
  c.width = Math.ceil(maxW + 60);
  c.height = Math.ceil(lineGap * lines.length + 60);
  g.font = font;
  g.fillStyle = '#fff';
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  lines.forEach((ln, i) => {
    g.fillText(ln, c.width / 2, 30 + lineGap * (i + 0.5));
  });

  // 采样像素
  const img = g.getImageData(0, 0, c.width, c.height).data;
  const pts = [];
  const step = big ? 4 : 5;
  for (let y = 0; y < c.height; y += step) {
    for (let x = 0; x < c.width; x += step) {
      if (img[(y * c.width + x) * 4 + 3] > 120) {
        pts.push([x - c.width / 2, -(y - c.height / 2)]);
      }
    }
  }

  // 缩放到可视区域
  const visH = 2 * camera.position.z * Math.tan(THREE.MathUtils.degToRad(camera.fov / 2));
  const visW = visH * camera.aspect;
  const scale = Math.min(visW * 0.86 / c.width, visH * 0.62 / c.height);
  for (const p of pts) { p[0] *= scale; p[1] *= scale; }
  return pts;
}

function setTextTargets(text) {
  let lines;
  const portrait = window.innerHeight > window.innerWidth;
  if (text === '__NAME__') {
    lines = ['范冰倩', '生日快乐'];
  } else if (text === '__MSG__') {
    lines = portrait ? ['祝你每天', '都开心!'] : ['祝你每天都开心!'];
  } else {
    lines = [text];
  }
  const pts = sampleTextPoints(lines, text.length <= 2);
  if (!pts.length) return;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const p = pts[i % pts.length];
    targets[i*3]   = p[0] + (Math.random() - 0.5) * 0.5;
    targets[i*3+1] = p[1] + (Math.random() - 0.5) * 0.5;
    targets[i*3+2] = (Math.random() - 0.5) * 3;
  }
}

function setFloatTargets() {
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    targets[i*3]   = homePos[i*3];
    targets[i*3+1] = homePos[i*3+1];
    targets[i*3+2] = homePos[i*3+2];
  }
}

/* ============================================================
 * 全局状态
 * ============================================================ */
// display: 当前展示内容 'float' | '1' | '2' | '3' | 'name' | 'msg'
let display = 'float';
// mode: 'normal' | 'orb' | 'explode' | 'message'
let mode = 'normal';

let compress = 0;          // 压缩系数 0~1(平滑)
let compressTarget = 0;
let twoHandsActive = false; // 双手交互中:粒子运动实时跟随手速
let orbFrames = 0;         // 处于对握距离内的帧数
let orbLostFrames = 0;     // 对握状态下丢失双手的帧数(超时自动泄压)
let orbReady = false;      // 已进入"对握最小"状态
let prevHandDist = null;
let explodeTime = 0;
let messageTime = 0;

function switchDisplay(d) {
  if (display === d) return;
  const wasPhoto = display === 'photo';
  if (d === 'photo' && !photoReady) d = 'msg'; // 照片没加载好时退回祝福文字
  display = d;
  if (d === 'photo') {
    if (!setPhotoTargets()) { display = 'msg'; setTextTargets('__MSG__'); }
  } else {
    if (wasPhoto) restoreBaseColors();
    if (d === 'float') setFloatTargets();
    else if (d === 'name') setTextTargets('__NAME__');
    else if (d === 'msg') setTextTargets('__MSG__');
    else setTextTargets(d);
  }
  // 照片模式:普通混合 + 实心圆点还原真实色彩;其余模式:加法混合 + 发光贴图
  const isPhoto = display === 'photo';
  const blend = isPhoto ? THREE.NormalBlending : THREE.AdditiveBlending;
  const map = isPhoto ? photoSpriteTex : glowSpriteTex;
  if (material.blending !== blend || material.map !== map) {
    material.blending = blend;
    material.map = map;
    material.needsUpdate = true;
  }
}

/* ============================================================
 * 手势识别
 * ============================================================ */
let candidateGesture = -1; // 当前候选手势(手指数, 0=无手)
let candidateFrames = 0;
let stableGesture = 0;

function countFingers(lm) {
  // 距离比值判断,与手的旋转角度无关
  const D = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
  const wrist = lm[0];
  let n = 0;
  // 四指:伸直时指尖到手腕的距离明显大于第二关节(PIP)到手腕的距离;弯曲时反之
  for (const [tip, pip] of [[8, 6], [12, 10], [16, 14], [20, 18]]) {
    if (D(lm[tip], wrist) > D(lm[pip], wrist) * 1.15) n++;
  }
  // 拇指:张开时指尖远离小指根(17),收拢时贴近手掌
  if (D(lm[4], lm[17]) > D(lm[3], lm[17]) * 1.15) n++;
  return n;
}

function handleGestureFrame(results) {
  const hands = results.multiHandLandmarks || [];
  twoHandsActive = hands.length === 2 && mode !== 'explode' && mode !== 'message';

  /* ---------- 双手:压缩/对握/爆炸 状态机 ---------- */
  if (hands.length === 2 && mode !== 'explode' && mode !== 'message') {
    const a = hands[0][9], b = hands[1][9]; // 掌心
    const d = Math.hypot(a.x - b.x, a.y - b.y);

    // 压缩比例与距离实时绑定
    compressTarget = THREE.MathUtils.clamp(
      (COMPRESS_MAX_DIST - d) / (COMPRESS_MAX_DIST - ORB_DIST), 0, 1);

    if (d < ORB_DIST) {
      orbFrames++;
      if (orbFrames >= 4) { orbReady = true; mode = 'orb'; }
    } else {
      orbFrames = 0;
    }

    // 爆炸(必须先对握):快速分开,或对握后双手重新出现时已经明显分开
    if (orbReady && (
      (prevHandDist !== null && (d - prevHandDist) > EXPLODE_SPEED && d > ORB_DIST * 1.3) ||
      d > 0.34
    )) {
      triggerExplosion();
    }
    prevHandDist = d;
    orbLostFrames = 0;
    candidateGesture = -1; candidateFrames = 0; // 双手时不做单手识别
    return;
  }

  // 双手握到一起时检测器经常丢手(两手重叠)——刚才还在双手压缩且压得足够紧时,丢手视为"对握完成"
  if (hands.length < 2 && mode !== 'explode' && mode !== 'message') {
    if (!orbReady && compress > 0.7 && prevHandDist !== null) { orbReady = true; mode = 'orb'; }
  }
  if (mode === 'orb' && hands.length < 2) {
    orbFrames = 0;
    orbLostFrames++;
    if (orbLostFrames > 75) { mode = 'normal'; orbReady = false; } // 约3秒没等到双手重新出现,自动泄压
  }
  if (mode === 'normal') { compressTarget = 0; orbReady = false; orbFrames = 0; prevHandDist = null; orbLostFrames = 0; }
  if (mode === 'orb') compressTarget = 1;

  /* ---------- 单手:手指数 → 文字 ---------- */
  if (mode !== 'normal') return; // 爆炸/展示/蓄能期间不切换文字

  let g = 0;
  if (hands.length >= 1) g = countFingers(hands[0]);

  if (g === candidateGesture) {
    candidateFrames++;
  } else {
    candidateGesture = g;
    candidateFrames = 1;
  }
  if (candidateFrames >= STABLE_FRAMES && g !== stableGesture) {
    stableGesture = g;
    if (g === 1) switchDisplay('1');
    else if (g === 2) switchDisplay('2');
    else if (g === 3) switchDisplay('3');
    else if (g === 4) switchDisplay('name');
    else switchDisplay('float'); // 0 或 5 指 → 星空
  }
}

/* ---------- 爆炸 ---------- */
function triggerExplosion() {
  mode = 'explode';
  explodeTime = 0;
  orbReady = false; orbFrames = 0; prevHandDist = null;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const x = positions[i*3], y = positions[i*3+1], z = positions[i*3+2];
    const len = Math.hypot(x, y, z) || 1;
    const speed = 30 + Math.random() * 45;
    velocities[i*3]   = (x / len) * speed + (Math.random() - 0.5) * 18;
    velocities[i*3+1] = (y / len) * speed + (Math.random() - 0.5) * 18;
    velocities[i*3+2] = (z / len) * speed + (Math.random() - 0.5) * 18;
  }
}

/* ============================================================
 * 渲染循环
 * ============================================================ */
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;

  // 双手交互时压缩值几乎实时跟随手距(只留一点点平滑去抖),粒子速度与手速一致
  compress += (compressTarget - compress) * (twoHandsActive ? 0.6 : 0.12);

  const posAttr = geometry.attributes.position;

  if (mode === 'explode') {
    explodeTime += dt;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      positions[i*3]   += velocities[i*3]   * dt;
      positions[i*3+1] += velocities[i*3+1] * dt;
      positions[i*3+2] += velocities[i*3+2] * dt;
      velocities[i*3] *= 0.965; velocities[i*3+1] *= 0.965; velocities[i*3+2] *= 0.965;
    }
    material.opacity = Math.max(0.35, 1.2 - explodeTime * 0.7);
    material.size = 1.4 - explodeTime * 0.3;
    if (explodeTime > 1.3) {
      mode = 'message';
      messageTime = 0;
      compress = 0; compressTarget = 0;
      display = ''; // 强制刷新
      switchDisplay('photo'); // 爆炸后汇聚成人物粒子画像(照片没加载好会自动退回文字)
    }
  } else {
    // 缓动飞向目标(带压缩);双手交互时用高追踪系数,粒子紧贴手的快慢
    const k = twoHandsActive ? 0.35 : (display === 'float' ? 0.025 : 0.07);
    const shrink = 1 - compress * 0.93;
    const jitter = compress > 0.9 ? 0.5 : 0; // 蓄能颤动
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      let tx = targets[i*3] * shrink;
      let ty = targets[i*3+1] * shrink;
      let tz = targets[i*3+2] * shrink;
      if (display === 'float') {
        // 星空缓慢漂浮
        tx += Math.sin(t * 0.3 + phase[i]) * 2.5;
        ty += Math.cos(t * 0.22 + phase[i] * 1.3) * 2.0;
      }
      if (jitter) {
        tx += (Math.random() - 0.5) * jitter;
        ty += (Math.random() - 0.5) * jitter;
      }
      positions[i*3]   += (tx - positions[i*3])   * k;
      positions[i*3+1] += (ty - positions[i*3+1]) * k;
      positions[i*3+2] += (tz - positions[i*3+2]) * k;
    }

    // 亮度/大小随状态变化
    let targetOpacity = 0.9, targetSize = 0.9;
    if (display === 'photo') { targetOpacity = 1; targetSize = photoDotSize; } // 照片模式:实色小点还原画面
    if (compress > 0.05) {
      targetOpacity = 0.9 + compress * 0.3;
      targetSize = 0.9 + compress * 0.9;
    }
    if (mode === 'message') {
      messageTime += dt;
      if (display !== 'photo') {
        targetOpacity = 0.9 + Math.sin(t * 14) * (messageTime < 2 ? 0.25 : 0.08); // 文字闪烁;照片不闪
      }
      const dur = display === 'photo' ? 9 : 6;
      if (messageTime > dur) { mode = 'normal'; stableGesture = -99; switchDisplay('float'); }
    }
    material.opacity += (targetOpacity - material.opacity) * 0.1;
    material.size += (targetSize - material.size) * 0.1;
  }

  updateBalloons(t, dt);

  posAttr.needsUpdate = true;
  scene.rotation.y = Math.sin(t * 0.05) * 0.03;
  renderer.render(scene, camera);
}
animate();

/* ============================================================
 * 自适应 & 防缩放
 * ============================================================ */
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  // 重新按新宽度排版当前文字
  if (display !== 'float' && mode !== 'explode') {
    const d = display; display = ''; switchDisplay(d);
  }
}
window.addEventListener('resize', onResize);
// 横竖屏旋转:不同浏览器时序不一,多补两次确保排版刷新
window.addEventListener('orientationchange', () => { setTimeout(onResize, 300); setTimeout(onResize, 900); });
if (window.visualViewport) window.visualViewport.addEventListener('resize', onResize);
document.addEventListener('dblclick', e => e.preventDefault(), { passive: false });
document.addEventListener('gesturestart', e => e.preventDefault(), { passive: false });

/* ============================================================
 * 摄像头 + MediaPipe(需用户手势启动)
 * ============================================================ */
const startBtn = document.getElementById('startBtn');
const overlay = document.getElementById('startOverlay');
const loading = document.getElementById('loading');
const errMsg = document.getElementById('errMsg');
let modelLoaded = false;

function setLoading(text) { loading.textContent = text; }

// 带进度预下载模型文件(下载进浏览器 HTTP 缓存,MediaPipe 随后加载时直接命中,不会重复下载)
async function prefetchModelFiles() {
  // 检测 WASM SIMD 支持,只下载会用到的那套文件
  const simd = WebAssembly.validate(new Uint8Array([
    0,97,115,109,1,0,0,0,1,5,1,96,0,1,123,3,2,1,0,10,10,1,8,0,65,0,253,15,253,98,11
  ]));
  const files = [
    simd ? 'hands_solution_simd_wasm_bin.js'   : 'hands_solution_wasm_bin.js',
    simd ? 'hands_solution_simd_wasm_bin.wasm' : 'hands_solution_wasm_bin.wasm',
    'hands_solution_packed_assets_loader.js',
    'hands_solution_packed_assets.data',
    'hands.binarypb',
    'hand_landmark_lite.tflite',
  ];
  let got = 0, total = 0;
  await Promise.all(files.map(async f => {
    const resp = await fetch('./vendor/hands/' + f);
    if (!resp.ok) throw new Error('模型文件下载失败: ' + f + ' (HTTP ' + resp.status + ')');
    total += +resp.headers.get('Content-Length') || 0;
    if (!resp.body) { await resp.arrayBuffer(); got = total; return; } // 旧浏览器无流式读取
    const reader = resp.body.getReader();
    for (;;) {
      const { done, value } = await reader.read();
      if (done) break;
      got += value.length;
      if (total) setLoading('模型下载中 ' + Math.min(99, Math.round(got / total * 100)) + '%(首次约13MB,请耐心等待)');
    }
  }));
}

startBtn.addEventListener('click', async () => {
  overlay.classList.add('hide');
  loading.classList.add('show');

  if (!window.isSecureContext) {
    showError('当前页面不是 HTTPS,摄像头无法启动。\n请通过 https:// 链接访问(GitHub Pages / Vercel 部署后即可)。');
    return;
  }

  const video = document.getElementById('video');
  const hands = new Hands({
    locateFile: f => `./vendor/hands/${f}`,
  });
  hands.setOptions({
    maxNumHands: 2,
    modelComplexity: 0,        // 移动端流畅优先
    minDetectionConfidence: 0.5, // 放宽,减少双手靠近时丢检测
    minTrackingConfidence: 0.5,
    selfieMode: true,          // 与镜像预览一致
  });
  hands.onResults(results => {
    if (!modelLoaded) {
      modelLoaded = true;
      loading.classList.remove('show');
      document.getElementById('hint').classList.add('show');
    }
    handleGestureFrame(results);
  });

  // 1) 下载模型(带进度)
  try {
    setLoading('模型下载中…');
    await prefetchModelFiles();
  } catch (err) {
    showError('模型下载失败:' + (err && err.message ? err.message : err) + '\n请检查网络后刷新页面重试。');
    return;
  }

  // 2) 初始化 WASM 识别引擎
  try {
    setLoading('模型初始化中…');
    await hands.initialize();
  } catch (err) {
    showError('模型初始化失败:' + (err && err.message ? err.message : err) + '\n请刷新页面重试,建议使用 Safari。');
    return;
  }

  // 3) 启动摄像头
  try {
    setLoading('摄像头启动中…');
    const cam = new Camera(video, {
      onFrame: async () => { try { await hands.send({ image: video }); } catch (e) {} },
      width: 640,
      height: 480,
      facingMode: 'user',
    });
    await cam.start();
    document.getElementById('camWrap').classList.add('show'); // 小窗立即显示,便于确认摄像头正常
    setLoading('请把手放入镜头画面');
    setTimeout(() => {
      if (!modelLoaded) setLoading('迟迟无响应?请刷新页面重试,或改用 Safari 打开');
    }, 25000);
  } catch (err) {
    showError('摄像头启动失败:' + (err && err.message ? err.message : err) +
      '\n请确认已允许摄像头权限(设置→Safari→摄像头),建议用 Safari 打开。');
  }
});

function showError(msg) {
  loading.classList.remove('show');
  errMsg.textContent = msg;
  errMsg.style.display = 'block';
  errMsg.style.whiteSpace = 'pre-line';
}
</script>
</body>
</html>
